<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="design.css">
    <title>Harta Timișoarei</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
        }
        #address {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        .leaflet-control-zoom {
            top: 80px !important;
        }
    </style>
</head>
<body>
     <nav class="navbar">
        <ul> 
            <li><a href="../home/homepage.html" class="active">Home</a></li>
            <li><a href="../pagini-navbar/contact.html">Contact</a></li>
            <li><a href="../pagini-navbar/harta.html">Harta</a></li>
            <li class="right"><a href="../pagini-navbar/aboutus.html">AboutUs</a></li>
            
        </ul>
    </nav>
    <div id="map"></div>
    <div id="address">Adresa: </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([45.7489, 21.2087], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        var marker;

        map.on('click', function(e) {
            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker(e.latlng).addTo(map);
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${e.latlng.lat}&lon=${e.latlng.lng}&format=json`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('address').innerText = 'Adresa: ' + data.display_name;
                });
        });
    </script>
</body>
