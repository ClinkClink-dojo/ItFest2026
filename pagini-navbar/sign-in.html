<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
 <link rel="stylesheet" href="design.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal Voluntari</title>
<style>
body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:40px;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
transition:background-image 1s ease-in-out;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
z-index:0;
}

.container{
position:relative;
z-index:1;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
width:320px;
}

h2{
text-align:center;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:5px;
background:#27ae60;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#27ae60;
}

.section{
margin-bottom:40px;
}
</style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <ul> 
            <li><a href="./homepage.html" class="nav-link-home">Home</a></li>
            <li><a href="../pagini-navbar/contact.html" class="nav-link-signin">Sign In</a></li>
        </ul>
    </div>
</nav>

<div class="overlay"></div>

<div class="container">

<!-- FORMULAR INREGISTRARE -->
<div class="section">
<h2>Înregistrare Voluntar</h2>
<form onsubmit="signupVolunteer(event)">
<input type="text" placeholder="Prenume" required>
<input type="text" placeholder="Nume" required>
<input type="tel" placeholder="Număr de telefon" required>
<input type="text" placeholder="Adresă" required>
<label>Data nașterii</label>
<input type="date" required>
<label>Fotografie act identitate</label>
<input type="file" accept="image/*" required>
<button type="submit">Creează cont</button>
</form>
</div>

<!-- FORMULAR LOGIN -->
<div class="section">
<h2>Autentificare Voluntar</h2>
<form onsubmit="loginVolunteer(event)">
<input type="text" placeholder="Nume utilizator" required>
<input type="password" placeholder="Parolă" required>
<button type="submit">Autentificare</button>
</form>
</div>

</div>

<script>
const images = [
"loginIMG1.jpg",
"loginIMG2.jpg",
"loginIMG3.jfif"
];

let index = 0;

function changeBackground(){
document.body.style.backgroundImage = `url('${images[index]}')`;
index = (index + 1) % images.length;
}

changeBackground();
setInterval(changeBackground, 5000);

function loginVolunteer(event){
event.preventDefault();
window.location.href = "../amnevoiedeajutor/dashboards.html";
}

function signupVolunteer(event){
event.preventDefault();
alert("Cont creat! Acum te poți autentifica.");
}
</script>

</body>
</html>
