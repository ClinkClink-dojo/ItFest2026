<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Solicită Ajutor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff7ed; padding: 20px; color: #431407; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; border: 3px solid #fb923c; }
        h1 { color: #ea580c; }
        label { display: block; text-align: left; font-weight: bold; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #fed7aa; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Secțiunea care va fi ascunsă/afișată */
        #sectiuneExtra { display: none; margin-top: 20px; border-top: 1px solid #fed7aa; padding-top: 10px; }
        
        button.main-btn { background: #ea580c; color: white; border: none; width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 12px; cursor: pointer; margin-top: 25px; font-weight: bold; }
        #map { height: 250px; width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid #fed7aa; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Ajutor Vecini</h1>
        
        <label>Nume Prenume:</label>
        <input type="text" id="nume" placeholder="Ex: Maria Popescu">

        <label>Cum dorești să fii ajutat?</label>
        <select id="tipAjutor" onchange="toggleSectiune()">
            <option value="">-- Alege o variantă --</option>
            <option value="Telefonic">📞 Telefonic (doar vorbim)</option>
            <option value="În persoană">🤝 În persoană (am nevoie de cineva aici)</option>
        </select>

        <div id="sectiuneExtra">
            <label>Cu ce ai nevoie de ajutor? (scurt):</label>
            <textarea id="detaliiAjutor" rows="2" placeholder="Ex: Să duc gunoiul / Să urce plasele..."></textarea>

            <label>Apasă pe hartă unde locuiești:</label>
            <div id="map"></div>
            <input type="text" id="adresaText" placeholder="Scrie strada și numărul" style="margin-top:10px;">
        </div>

        <button class="main-btn" onclick="trimiteCerere()">Trimite Cererea</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, coords = "";

        function toggleSectiune() {
            const tip = document.getElementById('tipAjutor').value;
            const sectiune = document.getElementById('sectiuneExtra');
            
            if (tip === "În persoană") {
                sectiune.style.display = "block";
                initMap(); // Inițializăm harta când devine vizibilă
            } else {
                sectiune.style.display = "none";
            }
        }

    function initMap() {
    if (!map) {
        map = L.map('map').setView([45.7489, 21.2087], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // CLICK PE HARTĂ -> Pune Pin și scrie Adresa
        map.on('click', function(e) {
            plaseazaMarker(e.latlng.lat, e.latlng.lng, true);
        });

        // SCRIS ÎN CĂSUȚĂ -> Caută pe hartă și pune Pin
        document.getElementById('adresaText').addEventListener('change', function() {
            cautaAdresa(this.value);
        });
    }
    setTimeout(() => { map.invalidateSize(); }, 200);
}

function plaseazaMarker(lat, lng, updateText) {
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);
    coords = lat.toFixed(4) + ", " + lng.toFixed(4);

    if (updateText) {
        fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
            .then(res => res.json())
            .then(data => {
                if (data.address) {
                    const strada = data.address.road || "";
                    const numar = data.address.house_number || "";
                    document.getElementById('adresaText').value = strada + (numar ? " nr. " + numar : "");
                }
            });
    }
}

function cautaAdresa(textAdresa) {
    if (textAdresa.length < 3) return;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(textAdresa)}`)
        .then(res => res.json())
        .then(results => {
            if (results.length > 0) {
                const firstResult = results[0];
                const lat = parseFloat(firstResult.lat);
                const lon = parseFloat(firstResult.lon);

                // Mutăm harta și punem pin-ul
                map.setView([lat, lon], 16);
                plaseazaMarker(lat, lon, false); // false pentru a nu suprascrie ce a scris omul
            }
        });
}

        function trimiteCerere() {
            const nume = document.getElementById('nume').value;
            const tip = document.getElementById('tipAjutor').value;
            
            if(!nume || !tip) return alert("Te rugăm să completezi numele și tipul de ajutor!");

            const cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
            
            const nouaCerere = {
                nume,
                tip,
                detalii: document.getElementById('detaliiAjutor').value || "Nespecificat",
                adresa: document.getElementById('adresaText').value || "Doar telefonic",
                coords: coords,
                ora: new Date().toLocaleTimeString('ro-RO', {hour: '2-digit', minute:'2-digit'})
            };

            cereri.push(nouaCerere);
            localStorage.setItem('groceryRequests', JSON.stringify(cereri));
            alert("Cererea a fost trimisă!");
            location.reload();
        }
    </script>
</body>
</html>
