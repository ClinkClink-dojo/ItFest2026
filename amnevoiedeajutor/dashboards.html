<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Panou Voluntar - Gamified</title>
    <link rel="stylesheet" href="../pagini-navbar/design.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #f1f5f9; }
        .main-content { flex: 1; display: flex; min-height: 0; }
        #lista { width: 380px; overflow-y: auto; padding: 20px; border-right: 2px solid #cbd5e1; box-sizing: border-box; }
        #mapFull { flex-grow: 1; position: relative; }
        
        /* Gamification Styles */
        .stats-panel {
            background: #22c55e;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(19, 17, 17, 0.1);
        }
        .level-badge {
            background: #f59e0b;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .progress-container {
            background: #ffffff;
            height: 12px;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #eced8c, #ea580c);
            transition: width 0.5s ease-in-out;
        }
        .xp-text { font-size: 0.75rem; color: #cbd5e1; margin-top: 5px; display: block; }

        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 8px solid #27ae60; box-shadow: 0 4px 6px rgba(35, 31, 31, 0.05); }
        .card.urgent { border-left-color: #ef4444; }
        .tel-link { color: #ea580c; font-weight: bold; text-decoration: none; font-size: 1.1rem; }
        .btn-done { width: 100%; background: #22c55e; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .goback {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            margin-bottom: 20px;
            background-color: #ffffff;
            color: #475569; 
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            border: 1px solid #27ae60;
            transition: all 0.2s ease;
        }

        #legenda-harta {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #27ae60;
            font-size: 13px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .marker-spital { filter: hue-rotate(140deg) brightness(0.8); }
        .marker-farmacie { filter: hue-rotate(200deg); }
        .marker-supermarket { filter: hue-rotate(60deg); }
        .marker-sediu { filter: hue-rotate(250deg) brightness(1.2); }
    </style>
</head>
<body>

<div class="main-content">

<div id="lista">
    <a href="../home/homepage-voluntar.html" class="goback">
        <span>←</span> Înapoi la Home
    </a>

    <div class="stats-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold;">Eroul Zilei</span>
            <span class="level-badge" id="level-display">Nivel 1</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <span class="xp-text" id="xp-display">0 / 5 misiuni până la nivelul următor</span>
    </div>

    <h2>Solicitări Active</h2>
    <div id="continut"></div>
</div>

<div id="mapFull">
    <div id="legenda-harta">
        <strong>📍 Resurse Utile:</strong><br>
        <span style="color: #e74c3c;">●</span> Spital (Urgențe)<br>
        <span style="color: #dbc234;">●</span> Farmacie<br>
        <span style="color: #c40ff1;">●</span> Supermarket<br>
        <span style="color: #27ae60;">●</span> Sediul SeniorLink
    </div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    
    const MAX_XP = 5; 
    function actualizeazaStatistici() {
        let xp = parseInt(localStorage.getItem('volunteerXP')) || 0;
        let nivel = Math.floor(xp / MAX_XP) + 1;
        let xpInNivel = xp % MAX_XP;
        
        let procent = (xpInNivel / MAX_XP) * 100;
        
        document.getElementById('progress-bar').style.width = procent + "%";
        document.getElementById('level-display').innerText = "Nivel " + nivel;
        document.getElementById('xp-display').innerText = `${xpInNivel} / ${MAX_XP} misiuni până la nivelul următor`;
    }

    function adaugaXP() {
    let xp = parseInt(localStorage.getItem('volunteerXP')) || 0;
    let noulXP = xp + 1;
    localStorage.setItem('volunteerXP', noulXP);
    
    let nivelNou = Math.floor(noulXP / MAX_XP) + 1;

    
    if (nivelNou >= 4) {
        alert("Felicitări! Ai demonstrat un devotament incredibil. Te redirecționăm către pagina Despre Noi!");
        
        window.location.href = "../pagini-navbar/aboutus.html"; 
    } else {
        actualizeazaStatistici();
    }
}

    let dashMap = L.map('mapFull').setView([45.75674951182751, 21.228658586145983], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(dashMap);
    
    let markers = [];

    const resurseUtile = [
        { nume: "Spitalul Județean", tip: "spital", coords: [45.7411, 21.2421] },
        { nume: "Spitalul Militar", tip: "spital", coords: [45.757084348847386, 21.225061456880937] },
        { nume: "Spitalul Municipal", tip: "spital", coords: [45.75933689403906, 21.22687896354529] },
        { nume: "Spitalul de Boli Infectioase", tip: "spital", coords: [45.769036073458835, 21.25965536548905] },
        { nume: "Farmacia HelpNet Non-Stop", tip: "farmacie", coords: [45.7540, 21.2255] },
        { nume: "Farmacia Tonica", tip: "farmacie", coords: [45.76316862735653, 21.248119636410056] },
        { nume: "Farmacia Dona", tip: "farmacie", coords: [45.73437384870633, 21.200340517946973] },
        { nume: "Supermarket Profi", tip: "supermarket", coords: [45.7500, 21.2100] },
        { nume: "Auchan", tip: "supermarket", coords: [45.7667679223308, 21.228277726585077] },
        { nume: "Supermarket Profi City", tip: "supermarket", coords: [45.748977675603356, 21.23973874939953] },
        { nume: "Sediul SeniorLink", tip: "sediu", coords: [45.7685, 21.2465] }
    ];

    function incarcaResurse() {
        resurseUtile.forEach(loc => {
            const mResursa = L.marker(loc.coords).addTo(dashMap);
            if (mResursa._icon) {
                if (loc.tip === "spital") mResursa._icon.classList.add("marker-spital");
                if (loc.tip === "farmacie") mResursa._icon.classList.add("marker-farmacie");
                if (loc.tip === "supermarket") mResursa._icon.classList.add("marker-supermarket");
                if (loc.tip === "sediu") mResursa._icon.classList.add("marker-sediu");
            }
            mResursa.bindPopup(`<b>${loc.tip.toUpperCase()}</b><br>${loc.nume}`);
        });
    }

    incarcaResurse();

    function randeaza() {
        const cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
        const container = document.getElementById('continut');
        container.innerHTML = "";
        
        markers.forEach(m => dashMap.removeLayer(m));
        markers = [];

        cereri.forEach((c, index) => {
            const isUrgent = c.tip === "În persoană";
            container.innerHTML += `
                <div class="card ${isUrgent ? 'urgent' : ''}">
                    <strong>${c.nume}</strong> <small>(${c.ora})</small><br>
                    <a href="tel:${c.tel}" class="tel-link">📞 ${c.tel}</a><br>
                    <b>Tip:</b> ${c.tip}<br>
                    ${isUrgent ? `<div style="background:#f1f5f9;padding:5px;margin:5px 0;">${c.detalii}</div>` : ''}
                    <p style="font-size:0.8rem">📍 ${c.adresa}</p>
                    <button class="btn-done" onclick="rezolva(${index})">Rezolvat</button>
                </div>
            `;

            if(c.coords) {
                const l = c.coords.split(",");
                const m = L.marker([l[0], l[1]]).addTo(dashMap)
                           .bindPopup(`<b>Cerere: ${c.nume}</b><br>${c.detalii}`);
                markers.push(m);
            }
        });
    }

    function rezolva(index) {
        let cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
        cereri.splice(index, 1);
        localStorage.setItem('groceryRequests', JSON.stringify(cereri));
        
        
        adaugaXP();
        randeaza();
    }

    
    actualizeazaStatistici();
    setInterval(randeaza, 4000);
    randeaza();
</script>

</body>
</html>
