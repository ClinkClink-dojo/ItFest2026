<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Panou Voluntar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f1f5f9; }
        #lista { width: 380px; overflow-y: auto; padding: 20px; border-right: 2px solid #cbd5e1; box-sizing: border-box; }
        #mapFull { flex-grow: 1; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 8px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card.urgent { border-left-color: #ef4444; }
        .tel-link { color: #ea580c; font-weight: bold; text-decoration: none; font-size: 1.1rem; }
        .btn-done { width: 100%; background: #22c55e; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .goback { display: inline-block; margin:auto    ; color: white; text-decoration: none; font-weight: bold; background-color:#22c55e }
    </style>
</head>
<body>

    <div id="lista">
        <a href="../home/homepage.html" class="goback">Home</a>
        <h2>Solicitări Active</h2>
        <div id="continut"></div>
    </div>
    <div id="mapFull"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let dashMap = L.map('mapFull').setView([45.7489, 21.2087], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(dashMap);
        let markers = [];

        function randeaza() {
            const cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
            const container = document.getElementById('continut');
            container.innerHTML = "";
            markers.forEach(m => dashMap.removeLayer(m));

            cereri.forEach((c, index) => {
                const isUrgent = c.tip === "În persoană";
                container.innerHTML += `
                    <div class="card ${isUrgent ? 'urgent' : ''}">
                        <strong>${c.nume}</strong> <small>(${c.ora})</small><br>
                        <a href="tel:${c.tel}" class="tel-link">📞 ${c.tel}</a><br>
                        <b>Tip:</b> ${c.tip}<br>
                        ${isUrgent ? `<div style="background:#f1f5f9;padding:5px;margin:5px 0;">${c.detalii}</div>` : ''}
                        <p style="font-size:0.8rem">📍 ${c.adresa}</p>
                        <button class="btn-done" onclick="rezolva(${index})">Rezolvat</button>
                    </div>
                `;

                if(c.coords) {
                    const l = c.coords.split(",");
                    const m = L.marker([l[0], l[1]]).addTo(dashMap)
                               .bindPopup(`<b>${c.nume}</b><br>${c.tel}<br>${c.detalii}`);
                    markers.push(m);
                }
            });
        }

        function rezolva(index) {
            let cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
            cereri.splice(index, 1);
            localStorage.setItem('groceryRequests', JSON.stringify(cereri));
            randeaza();
        }

        setInterval(randeaza, 4000);
        randeaza();
    </script>
</body>
</html>
