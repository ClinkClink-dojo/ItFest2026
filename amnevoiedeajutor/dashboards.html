<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Panou Voluntar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f1f5f9; }
        #lista { width: 380px; overflow-y: auto; padding: 20px; border-right: 2px solid #cbd5e1; }
        #mapFull { flex-grow: 1; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 8px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card.urgent { border-left-color: #ef4444; }
        .detalii-text { background: #f8fafc; padding: 8px; border-radius: 5px; font-style: italic; margin: 10px 0; color: #475569; border: 1px solid #e2e8f0; }
        .btn-done { width: 100%; background: #22c55e; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lista">
        <h2>Solicitări Noi</h2>
        <div id="continut"></div>
    </div>
    <div id="mapFull"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let dashMap = L.map('mapFull').setView([45.9432, 24.9668], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(dashMap);
        let markers = [];

        function randeaza() {
            const cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
            const container = document.getElementById('continut');
            container.innerHTML = "";
            markers.forEach(m => dashMap.removeLayer(m));

            cereri.forEach((c, index) => {
                const isUrgent = c.tip === "În persoană";
                
                // Adăugăm în lista laterală
                container.innerHTML += `
                    <div class="card ${isUrgent ? 'urgent' : ''}">
                        <strong>${c.nume}</strong> <small>(${c.ora})</small><br>
                        <b>Tip:</b> ${c.tip}<br>
                        ${isUrgent ? `<div class="detalii-text">" ${c.detalii} "</div>` : ''}
                        <p style="font-size:0.8rem">📍 ${c.adresa}</p>
                        <button class="btn-done" onclick="rezolva(${index})">Rezolvat / Șterge</button>
                    </div>
                `;

                // Punem marker pe hartă doar dacă avem coordonate
                if(c.coords) {
                    const l = c.coords.split(",");
                    const m = L.marker([l[0], l[1]]).addTo(dashMap)
                               .bindPopup(`<b>${c.nume}</b><br>${c.detalii}`);
                    markers.push(m);
                }
            });
        }

        function rezolva(index) {
            let cereri = JSON.parse(localStorage.getItem('groceryRequests')) || [];
            cereri.splice(index, 1);
            localStorage.setItem('groceryRequests', JSON.stringify(cereri));
            randeaza();
        }

        setInterval(randeaza, 4000);
        randeaza();
    </script>
</body>
</html>
