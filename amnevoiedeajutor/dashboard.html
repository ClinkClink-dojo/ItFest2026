<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h1>Active Grocery Requests</h1>
    <div id="requestList">Checking for requests...</div>

    <script>
        function loadRequests() {
            const listDiv = document.getElementById('requestList');
            // Get data from LocalStorage
            const data = JSON.parse(localStorage.getItem('groceryRequests')) || [];

            if (data.length === 0) {
                listDiv.innerHTML = "<p>No active requests. Everyone is all set! ✨</p>";
                return;
            }

            // Create the HTML for each request with a "Resolved" button
            // We use the 'index' to know which specific one to delete
            listDiv.innerHTML = data.map((req, index) => `
                <div class="request-card">
                    <div class="info">
                        <div class="name">${req.name}</div>
                        <div class="apt">Apt: ${req.apt} — <small>${req.time}</small></div>
                    </div>
                    <button class="resolve-btn" onclick="resolveRequest(${index})">Done & Resolved</button>
                </div>
            `).join('');
        }

        function resolveRequest(index) {
            // 1. Get the current list
            let data = JSON.parse(localStorage.getItem('groceryRequests')) || [];
            
            // 2. Remove the item at that specific index
            data.splice(index, 1);
            
            // 3. Save the new list back to LocalStorage
            localStorage.setItem('groceryRequests', JSON.stringify(data));
            
            // 4. Refresh the display
            loadRequests();
        }

        // Auto-refresh every 3 seconds so the helper sees new requests
        setInterval(loadRequests, 3000);
        
        // Initial load
        loadRequests();
    </script>
</body>
</html>
